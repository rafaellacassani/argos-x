<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Financeira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
<style>
[x-cloak]{display:none!important}
.kpi{background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f1f5f9;transition:box-shadow .15s,transform .15s}
.kpi:hover{box-shadow:0 6px 20px rgba(0,0,0,.09);transform:translateY(-2px)}
.nb{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;width:100%;transition:all .15s;text-align:left;cursor:pointer;border:none;background:none}
.nb-on{background:#6366f1;color:#fff}
.nb-off{color:#94a3b8}
.nb-off:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.mcell{min-width:66px;padding:3px 6px;border-radius:6px;font-size:11px;text-align:center;cursor:pointer;transition:opacity .1s;white-space:nowrap;display:block}
.mcell:hover{opacity:.75}
.mc-paid{background:#d1fae5;color:#065f46;font-weight:600}
.mc-pending{background:#fef3c7;color:#92400e}
.mc-skipped{background:#f1f5f9;color:#94a3b8}
.mc-empty{background:#f8fafc;color:#cbd5e1}
.bcell{min-width:80px;text-align:right;font-size:12px;padding:3px 6px;cursor:pointer;border-radius:4px;display:block}
.bcell:hover{background:#eff6ff}
</style>
</head>
<body class="font-sans antialiased bg-slate-50" x-data="rootApp()" x-init="boot()" x-cloak>

<!-- LOGIN -->
<div x-show="!authenticated" class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)">
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-32 -right-32 w-96 h-96 rounded-full" style="background:radial-gradient(circle,rgba(99,102,241,.18) 0%,transparent 70%)"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 rounded-full" style="background:radial-gradient(circle,rgba(168,85,247,.14) 0%,transparent 70%)"></div>
  </div>
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10 relative z-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,#6366f1,#9333ea)">
        <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Central Financeira</h1>
      <p class="text-slate-400 text-sm mt-1">Argos X · Controle total</p>
    </div>
    <form @submit.prevent="doLogin()" class="space-y-5">
      <div><label class="form-label">E-mail</label><input type="email" x-model="loginEmail" class="form-input mt-1" placeholder="seu@email.com" required autocomplete="email"></div>
      <div>
        <label class="form-label">Senha</label>
        <div class="relative mt-1">
          <input :type="showPwd?'text':'password'" x-model="loginPassword" class="form-input pr-10" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" @click="showPwd=!showPwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" :d="showPwd?'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21':'M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'"></path></svg>
          </button>
        </div>
      </div>
      <p x-show="loginError" x-text="loginError" class="text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3 text-center"></p>
      <button type="submit" :disabled="loginLoading" class="btn btn-primary w-full justify-center py-3 text-base rounded-xl gap-2">
        <svg x-show="loginLoading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        <span x-text="loginLoading?'Entrando...':'Entrar'"></span>
      </button>
    </form>
  </div>
</div>

<!-- APP -->
<template x-if="authenticated">
<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="fixed left-0 top-0 h-screen w-56 flex flex-col z-30" style="background:#0f172a;box-shadow:4px 0 24px rgba(0,0,0,.25)">
  <div class="px-5 py-5" style="border-bottom:1px solid rgba(255,255,255,.06)">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#9333ea)">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div><p class="text-white font-bold text-sm leading-tight">Central</p><p class="text-indigo-400 text-xs">Financeira</p></div>
    </div>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
    <button @click="page='dashboard'" :class="page==='dashboard'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</button>
    <button @click="page='patrimonio'" :class="page==='patrimonio'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4z"/></svg>Patrimônio</button>
    <button @click="page='transactions'" :class="page==='transactions'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>Transações</button>
    <button @click="page='clients'" :class="page==='clients'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Clientes</button>
    <button @click="page='investments'" :class="page==='investments'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>Investimentos</button>
    <button @click="page='unplanned'" :class="page==='unplanned'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>Contas a Vencer</button>
    <button @click="page='payment-methods'" :class="page==='payment-methods'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>Pagamentos</button>
    <button @click="page='entities'" :class="page==='entities'?'nb nb-on':'nb nb-off'">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Entidades</button>
  </nav>
  <div class="px-3 py-4" style="border-top:1px solid rgba(255,255,255,.06)">
    <p class="text-slate-500 text-xs px-3 mb-2 truncate">mafracassani@gmail.com</p>
    <button @click="doLogout()" class="nb nb-off w-full hover:!text-rose-400">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sair</button>
  </div>
</aside>

<!-- CONTENT -->
<div class="ml-56 flex-1 min-h-screen">

<!-- ═══ DASHBOARD ═══ -->
<section x-show="page==='dashboard'" x-data="dashboardPage()" x-init="init()">
<div class="p-8">
  <div class="flex items-start justify-between mb-8">
    <div><h1 class="text-2xl font-extrabold text-slate-900">Dashboard</h1><p class="text-slate-500 text-sm mt-1">Visão geral das finanças</p></div>
    <div class="flex items-center gap-3 flex-wrap justify-end">
      <select x-model="entityId" @change="load()" class="form-input form-select text-sm py-2">
        <option value="">Todas as entidades</option>
        <template x-for="e in entities" :key="e.id"><option :value="e.id" x-text="e.name"></option></template>
      </select>
      <select x-model="month" @change="load()" class="form-input form-select text-sm py-2" style="width:130px">
        <option value="">Ano todo</option>
        <template x-for="(m,i) in MONTHS" :key="i"><option :value="i+1" x-text="m"></option></template>
      </select>
      <input type="number" x-model="year" @change="load()" class="form-input text-sm py-2" style="width:90px">
      <button @click="load()" class="btn btn-secondary text-sm py-2">↻ Atualizar</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="grid grid-cols-2 lg:grid-cols-3 gap-5 mb-8">
    <div class="kpi"><div class="flex items-start justify-between mb-3"><p class="text-slate-500 text-sm font-medium">Despesas Pagas</p><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#fee2e2"><svg class="w-5 h-5" style="color:#ef4444" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/></svg></div></div><p class="text-3xl font-extrabold text-slate-900" x-text="summary?fmt(summary.total_expenses_paid):'—'"></p><p class="text-xs text-slate-400 mt-1">Efetivamente pago</p></div>
    <div class="kpi"><div class="flex items-start justify-between mb-3"><p class="text-slate-500 text-sm font-medium">Despesas Pendentes</p><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#fef3c7"><svg class="w-5 h-5" style="color:#f59e0b" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div></div><p class="text-3xl font-extrabold text-amber-600" x-text="summary?fmt(summary.total_expenses_pending):'—'"></p><p class="text-xs text-slate-400 mt-1">Ainda não pago</p></div>
    <div class="kpi"><div class="flex items-start justify-between mb-3"><p class="text-slate-500 text-sm font-medium">Receita Recebida</p><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#d1fae5"><svg class="w-5 h-5" style="color:#10b981" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></div></div><p class="text-3xl font-extrabold text-emerald-600" x-text="summary?fmt(summary.total_income_received):'—'"></p><p class="text-xs text-slate-400 mt-1">Recebido no período</p></div>
    <div class="kpi"><div class="flex items-start justify-between mb-3"><p class="text-slate-500 text-sm font-medium">Receita Pendente</p><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#dbeafe"><svg class="w-5 h-5" style="color:#3b82f6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div></div><p class="text-3xl font-extrabold text-blue-600" x-text="summary?fmt(summary.total_income_pending):'—'"></p><p class="text-xs text-slate-400 mt-1">A receber</p></div>
    <div class="kpi"><div class="flex items-start justify-between mb-3"><p class="text-slate-500 text-sm font-medium">Contas Extras</p><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#ede9fe"><svg class="w-5 h-5" style="color:#8b5cf6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div></div><p class="text-3xl font-extrabold text-violet-600" x-text="summary?fmt(summary.total_unplanned_pending):'—'"></p><p class="text-xs text-slate-400 mt-1">Contas a vencer pendentes</p></div>
    <div class="kpi" :style="summary&&summary.net_balance>=0?'border-color:#a7f3d0;background:linear-gradient(135deg,#fff,#f0fdf4)':'border-color:#fecaca;background:linear-gradient(135deg,#fff,#fff5f5)'">
      <div class="flex items-start justify-between mb-3"><p class="text-slate-500 text-sm font-medium">Saldo Líquido</p><div class="w-10 h-10 rounded-xl flex items-center justify-center" :style="summary&&summary.net_balance>=0?'background:#d1fae5':'background:#fee2e2'"><svg class="w-5 h-5" :style="summary&&summary.net_balance>=0?'color:#10b981':'color:#ef4444'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div></div>
      <p class="text-3xl font-extrabold" :class="netClass(summary?summary.net_balance:0)" x-text="summary?fmt(summary.net_balance):'—'"></p><p class="text-xs text-slate-400 mt-1">Receita − Despesas pagas</p>
    </div>
  </div>

  <!-- Chart + Clients -->
  <div class="grid grid-cols-3 gap-6 mb-6">
    <div class="col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-slate-900">Fluxo Mensal <span class="text-slate-400 font-normal text-sm" x-text="year"></span></h3>
        <div class="flex items-center gap-4 text-xs text-slate-400">
          <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#10b981;display:inline-block"></span>Receita</span>
          <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#f43f5e;display:inline-block"></span>Despesa</span>
        </div>
      </div>
      <div class="flex items-end gap-1.5" style="height:88px" x-show="flow.length">
        <template x-for="row in flow" :key="row.month">
          <div class="flex-1">
            <div class="flex items-end gap-0.5" style="height:72px">
              <div class="flex-1 rounded-t-sm transition-all" style="background:#10b981;min-height:3px" :style="`height:${barPct(row.income_received)}%`" :title="`Receita: ${fmt(row.income_received)}`"></div>
              <div class="flex-1 rounded-t-sm transition-all" style="background:#f43f5e;min-height:3px" :style="`height:${barPct(row.expenses_paid)}%`" :title="`Despesa: ${fmt(row.expenses_paid)}`"></div>
            </div>
            <p class="text-center mt-1" style="font-size:10px;color:#94a3b8" x-text="row.month_name"></p>
          </div>
        </template>
      </div>
      <p x-show="!flow.length" class="text-center text-slate-400 text-sm py-8">Sem dados</p>
    </div>
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
      <h3 class="font-bold text-slate-900 mb-5">Receita por Entidade</h3>
      <div class="space-y-5" x-show="clientsSummary.length">
        <template x-for="cs in clientsSummary" :key="cs.entity_id">
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <div class="flex items-center gap-2"><span class="entity-dot" :style="`background:${cs.entity_color}`"></span><span class="text-sm font-medium text-slate-700" x-text="cs.entity_name"></span></div>
              <span class="text-sm font-bold" x-text="fmt(cs.received)"></span>
            </div>
            <div class="h-1.5 rounded-full" style="background:#f1f5f9"><div class="h-full rounded-full transition-all" :style="`width:${cs.projected>0?Math.round(cs.received/cs.projected*100):0}%;background:${cs.entity_color}`"></div></div>
            <div class="flex justify-between text-xs text-slate-400 mt-1">
              <span x-text="`${cs.projected>0?Math.round(cs.received/cs.projected*100):0}% recebido`"></span>
              <span x-text="`de ${fmt(cs.projected)}`"></span>
            </div>
          </div>
        </template>
      </div>
      <p x-show="!clientsSummary.length" class="text-slate-400 text-sm text-center py-6">Sem clientes</p>
    </div>
  </div>

  <!-- Flow Table -->
  <div x-show="flow.length" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="tbl"><thead><tr><th>Mês</th><th>Receita Recebida</th><th>Receita Pendente</th><th>Despesas Pagas</th><th>Despesas Pendentes</th><th>Saldo</th></tr></thead>
    <tbody>
      <template x-for="row in flow" :key="row.month">
        <tr>
          <td class="font-semibold" x-text="row.month_name"></td>
          <td class="text-emerald-600 font-medium" x-text="fmt(row.income_received)"></td>
          <td class="text-blue-500" x-text="fmt(row.income_pending)"></td>
          <td class="text-rose-500" x-text="fmt(row.expenses_paid)"></td>
          <td class="text-amber-500" x-text="fmt(row.expenses_pending)"></td>
          <td class="font-bold" :class="row.net>=0?'text-emerald-600':'text-rose-600'" x-text="fmt(row.net)"></td>
        </tr>
      </template>
    </tbody></table>
  </div>
</div>
</section>

<!-- ═══ PATRIMÔNIO ═══ -->
<section x-show="page==='patrimonio'" x-data="patrimonioPage()" x-init="init()">
<div class="p-8">
  <div class="flex items-start justify-between mb-8">
    <div><h1 class="text-2xl font-extrabold text-slate-900">Patrimônio</h1><p class="text-slate-500 text-sm mt-1">Balanço patrimonial completo</p></div>
    <div class="flex items-center gap-3">

      const t=sessionStorage.getItem('cf_token');
      if(!t)return;
      const r=await fetch('/api/auth/verify?token='+t).catch(()=>null);
      if(r&&r.ok)this.authenticated=true; else sessionStorage.removeItem('cf_token');
    },
    async doLogin(){
      this.loginLoading=true; this.loginError='';
      const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:this.loginEmail,password:this.loginPassword})}).catch(()=>null);
      this.loginLoading=false;
      if(!r||!r.ok){const d=r?await r.json().catch(()=>({})):{};this.loginError=d.detail||'Erro ao conectar.';return;}
      const{token}=await r.json();
      sessionStorage.setItem('cf_token',token);
      this.authenticated=true;
    },
    async doLogout(){
      const t=sessionStorage.getItem('cf_token');
      if(t)await fetch('/api/auth/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})}).catch(()=>{});
      sessionStorage.removeItem('cf_token');
      this.authenticated=false;
    }
  };
}
</script>
</body>
</html>
